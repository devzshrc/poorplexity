services:
  - type: web
    name: poorplexity-backend
    runtime: node
    rootDir: backend
    buildCommand: bun install && bun run build
    startCommand: bun run start
    envVars:
      - key: BUN_VERSION
        value: 1.3.12
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: poorplexity
